# render.yaml — Render.com deployment blueprint
# This file configures automatic backend deployment on Render.com
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: buynest-backend
    runtime: node
    rootDir: buynest-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ⚠️ Set these in Render Dashboard → Environment → Secret Files
      # Do NOT hardcode secrets here
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
